<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Pencapaian Produksi (GitHub Pages)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f1f5f9;
            color: #1e293b;
            padding: 20px;
        }

        .app-container {
            max-width: 100%;
            margin: 0 auto;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
            margin-bottom: 20px;
        }

        .header-title h1 {
            font-size: 20px;
            color: #0f172a;
        }
        
        .header-title p {
            font-size: 13px;
            color: #64748b;
            margin-top: 4px;
        }

        .header-action {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Tombol 1: Lihat Grafik (Indigo) */
        .btn-secondary {
            background-color: #4f46e5;
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 500;
            font-size: 14px;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            border: none;
            cursor: pointer;
        }

        .btn-secondary:hover {
            background-color: #4338ca;
        }

        /* Tombol 2: Lihat Pencapaian (Emerald Green) */
        .btn-success {
            background-color: #10b981;
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 500;
            font-size: 14px;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
        }

        .btn-success:hover {
            background-color: #059669;
        }

        /* Tombol 3: Sync & Refresh (Blue) */
        .btn-sync {
            background-color: #2563eb;
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 500;
            font-size: 14px;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            border: none;
            cursor: pointer;
        }

        .btn-sync:hover {
            background-color: #1d4ed8;
        }

        /* Filter Style */
        .filter-card {
            background: white;
            padding: 16px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
            margin-bottom: 20px;
        }

        .filter-form {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-group label {
            font-size: 14px;
            font-weight: 500;
            color: #475569;
        }

        .filter-group select {
            padding: 6px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            outline: none;
            background-color: #f8fafc;
            cursor: pointer;
        }

        /* Table Style */
        .table-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
            overflow: hidden;
        }

        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid #f1f5f9;
        }

        .card-header h2 {
            font-size: 16px;
            color: #1e293b;
        }

        .table-responsive {
            overflow-x: auto;
            max-height: 72vh;
        }

        .styled-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
            white-space: nowrap;
        }

        .styled-table th {
            background-color: #f8fafc;
            color: #64748b;
            font-weight: 600;
            padding: 10px 16px;
            border-bottom: 1px solid #e2e8f0;
            border-right: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        /* Highlight tanggal di baris atas sticky */
        .styled-table tr:first-child th {
            top: 0;
            z-index: 12;
            background-color: #e2e8f0;
            color: #1e3a8a;
            font-size: 13px;
        }

        /* TH Nama Mesin & Batch - Pojok Kiri Atas Cross-Sticky */
        .styled-table th.sticky-corner {
            position: sticky;
            left: 0;
            top: 0;
            z-index: 30;
            background-color: #cbd5e1;
            border-right: 2px solid #94a3b8;
            color: #0f172a;
        }

        /* Header shift di baris bawah sticky */
        .styled-table tr:nth-child(2) th {
            top: 38px;
            z-index: 11;
            border-bottom: 2px solid #cbd5e1;
        }

        .styled-table td {
            padding: 10px 16px;
            border-bottom: 1px solid #f1f5f9;
            border-right: 1px solid #f1f5f9;
            color: #334155;
            vertical-align: middle;
        }

        /* Mengamankan efek sticky kolom nama mesin pada tbody td pertama secara global */
        .styled-table tbody tr td.sticky-col {
            position: sticky;
            left: 0;
            z-index: 5;
            background-color: #ffffff !important;
            border-right: 2px solid #cbd5e1 !important;
        }

        .styled-table tbody tr:hover {
            background-color: #f8fafc;
        }
        
        /* Highlight Hover untuk baris yang dikunci kiri */
        .styled-table tbody tr:hover td.sticky-col {
            background-color: #f1f5f9 !important;
        }

        /* Garis pemisah hitam horizontal antar kelompok mesin memanjang penuh */
        .styled-table tbody tr.machine-group-end td {
            border-bottom: 2px solid #000000 !important;
        }

        /* Box cell horizontal data */
        .cell-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 90px;
            text-align: center;
        }

        .badge-kode {
            font-size: 11px;
            font-weight: 700;
            color: #1e293b;
            background: #e2e8f0;
            padding: 2px 6px;
            border-radius: 4px;
            margin-bottom: 2px;
            max-width: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .badge-batch {
            font-size: 11px;
            font-family: monospace;
            color: #2563eb;
            background: #eff6ff;
            padding: 1px 4px;
            border-radius: 4px;
            margin-bottom: 4px;
        }

        .output-value {
            font-size: 14px;
            font-weight: 700;
            color: #0f172a;
        }

        .bg-empty {
            background-color: #fafafa;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="dashboard-header">
            <div class="header-title">
                <h1>📊 Dashboard Pencapaian Production</h1>
            </div>
            <div class="header-action">
                <a href="diagram.html" class="btn-secondary">📈 Lihat Grafik</a>
                <a href="pencapaian.html" class="btn-success">📋 Lihat Pencapaian</a>
                <button class="btn-sync">🔄 Sync & Refresh</button>
            </div>
        </header>

        <main class="dashboard-content">
            <div class="filter-card">
                <form class="filter-form">
                    <div class="filter-group">
                        <label for="filter-bulan">Filter Bulan:</label>
                        <select id="filter-bulan" name="bulan">
                            <option value="all">-- Semua Bulan --</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="filter-mesin">Filter Mesin:</label>
                        <select id="filter-mesin" name="mesin">
                            <option value="all">-- Semua Mesin --</option>
                        </select>
                    </div>
                </form>
            </div>

            <div class="table-card">
                <div class="table-responsive">
                    <table class="styled-table">
                        <thead>
                        </thead>
                        <tbody>
                            <tr>
                                <td colspan="100" style="text-align:center; padding: 40px; color: #64748b;">
                                    Memuat data dari Google Sheets cloud...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
